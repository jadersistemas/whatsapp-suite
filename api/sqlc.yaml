version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/database/migrations"
    queries: "internal/database/queries"
    gen:
      go:
        package: "db"
        out: "internal/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: true
        overrides:
          - db_type: "json"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
